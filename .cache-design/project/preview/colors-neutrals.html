<!doctype html><html><head><meta charset="utf-8"><title>Neutrals & surfaces</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border-radius: 10px; overflow: hidden; border: 1px solid var(--line); }
  .sw .c { height: 76px; }
  .sw .m { padding: 8px 10px; background: var(--card); display: flex; justify-content: space-between; align-items: baseline; }
  .sw .n { font-size: 12px; font-weight: 600; color: var(--ink); }
  .sw .h { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
</style></head>
<body><div class="card-frame">
  <div class="grid-5">
    <div class="sw"><div class="c" style="background:#FAF6EC;"></div><div class="m"><span class="n">paper</span><span class="h">FAF6EC</span></div></div>
    <div class="sw"><div class="c" style="background:#FFFFFF;border-bottom:1px solid var(--line);"></div><div class="m"><span class="n">card</span><span class="h">FFFFFF</span></div></div>
    <div class="sw"><div class="c" style="background:#F4F1E3;"></div><div class="m"><span class="n">tint</span><span class="h">F4F1E3</span></div></div>
    <div class="sw"><div class="c" style="background:#E9E2CE;"></div><div class="m"><span class="n">line</span><span class="h">E9E2CE</span></div></div>
    <div class="sw"><div class="c" style="background:#D6A12B;"></div><div class="m"><span class="n">accent</span><span class="h">D6A12B</span></div></div>
    <div class="sw"><div class="c" style="background:#6B6B66;"></div><div class="m"><span class="n">muted</span><span class="h">6B6B66</span></div></div>
    <div class="sw"><div class="c" style="background:#232220;"></div><div class="m"><span class="n">ink</span><span class="h">232220</span></div></div>
    <div class="sw"><div class="c" style="background:#1F4032;"></div><div class="m"><span class="n">primary</span><span class="h">1F4032</span></div></div>
    <div class="sw"><div class="c" style="background:#C2543A;"></div><div class="m"><span class="n">clay</span><span class="h">C2543A</span></div></div>
    <div class="sw"><div class="c" style="background:#3A6E8F;"></div><div class="m"><span class="n">lake</span><span class="h">3A6E8F</span></div></div>
  </div>
  <p style="margin:0;font-size:12px;color:var(--muted);line-height:1.6;">
    Page canvas is <b>paper</b> — warm cream, never pure white. <b>Card</b> sits on paper, separated by a 1px <b>line</b> hairline rather than a shadow.
  </p>
</div></body></html>
