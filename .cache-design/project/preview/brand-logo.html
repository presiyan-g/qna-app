<!doctype html><html><head><meta charset="utf-8"><title>Logo lockups</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .lockup { border: 1px solid var(--line); border-radius: 12px; padding: 22px; display: flex; align-items: center; justify-content: center; min-height: 110px; }
  .wm { font-family: var(--font-sans); font-weight: 800; letter-spacing: -0.02em; color: var(--primary); font-size: 28px; }
  .ann { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 6px; text-align: center; }
  .mark { width: 56px; height: 56px; border-radius: 14px; background: var(--primary); color: var(--paper); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 32px; letter-spacing: -0.02em; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div>
      <div class="lockup" style="background: var(--paper);">
        <span class="wm">Quorum</span>
      </div>
      <div class="ann">Wordmark on paper</div>
    </div>
    <div>
      <div class="lockup" style="background: var(--primary);">
        <span class="wm" style="color: var(--paper);">Quorum</span>
      </div>
      <div class="ann">Wordmark on primary</div>
    </div>
    <div>
      <div class="lockup" style="background: var(--paper); display: flex; gap: 14px;">
        <div class="mark">Q</div>
        <span class="wm">Quorum</span>
      </div>
      <div class="ann">Mark + wordmark</div>
    </div>
  </div>
  <p style="margin:0;color:var(--muted);font-size:12px;line-height:1.6;">
    Wordmark is Geist 800 with −0.02em tracking. The "Q" monogram works as favicon, app icon, or in compressed contexts. <b>Never</b> stretch, tint, or outline the wordmark.
  </p>
</div></body></html>
