<!doctype html><html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid-m { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 8px 0; border-bottom: 1px solid var(--line); vertical-align: top; }
  th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 700; }
  code { font-family: var(--font-mono); font-size: 12px; color: var(--ink); }
  .demo { display: flex; flex-direction: column; gap: 12px; align-items: stretch; }
  .demo-card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px 16px;
    cursor: pointer;
    transition: transform 200ms cubic-bezier(0.16,1,0.3,1),
                border-color 200ms cubic-bezier(0.16,1,0.3,1),
                box-shadow 200ms cubic-bezier(0.16,1,0.3,1);
  }
  .demo-card:hover {
    transform: translateY(-2px);
    border-color: var(--primary);
    box-shadow: 0 18px 40px -22px rgba(31,64,50,0.28);
  }
  .demo-btn {
    align-self: flex-start;
    background: var(--primary); color: var(--paper); border: 0; border-radius: 9999px;
    padding: 11px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background-color 200ms cubic-bezier(0.16,1,0.3,1),
                box-shadow 200ms cubic-bezier(0.16,1,0.3,1),
                transform 120ms cubic-bezier(0.16,1,0.3,1);
  }
  .demo-btn:hover { background: #193428; box-shadow: 0 6px 16px -8px rgba(31,64,50,0.4); }
  .demo-btn:active { transform: translateY(1px); box-shadow: none; }
</style></head>
<body><div class="card-frame">
  <div class="grid-m">
    <div>
      <table>
        <tr><th>Token</th><th>Value</th></tr>
        <tr><td><code>--dur-fast</code></td><td><code>120ms</code></td></tr>
        <tr><td><code>--dur-base</code></td><td><code>200ms</code></td></tr>
        <tr><td><code>--dur-slow</code></td><td><code>320ms</code></td></tr>
        <tr><td><code>--ease-out</code></td><td><code>cubic-bezier(.16, 1, .3, 1)</code></td></tr>
        <tr><td><code>--ease-spring</code></td><td><code>cubic-bezier(.34, 1.56, .64, 1)</code></td></tr>
      </table>
      <p style="margin:10px 0 0;font-size:12px;color:var(--muted);line-height:1.6;">
        Never <code>transition: all</code>. CSS only — no JS animation.
      </p>
    </div>
    <div class="demo">
      <span class="label">HOVER ME</span>
      <div class="demo-card">
        <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;color:var(--primary);">Card · lift</div>
        <div style="margin-top:4px;font-size:14px;font-weight:600;">−2px + border primary + lift</div>
      </div>
      <button class="demo-btn">Submit answer</button>
    </div>
  </div>
</div></body></html>
