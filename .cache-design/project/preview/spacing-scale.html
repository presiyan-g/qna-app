<!doctype html><html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .sp-row { display: grid; grid-template-columns: 60px 1fr 60px; align-items: center; gap: 16px; padding: 6px 0; }
  .sp-row .name { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .sp-row .bar { background: var(--primary-soft); height: 18px; border-radius: 3px; }
  .sp-row .px { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-align: right; }
</style></head>
<body><div class="card-frame">
  <div>
    <div class="sp-row"><span class="name">space-1</span><div class="bar" style="width:4px;"></div><span class="px">4px</span></div>
    <div class="sp-row"><span class="name">space-2</span><div class="bar" style="width:8px;"></div><span class="px">8px</span></div>
    <div class="sp-row"><span class="name">space-3</span><div class="bar" style="width:12px;"></div><span class="px">12px</span></div>
    <div class="sp-row"><span class="name">space-4</span><div class="bar" style="width:16px;"></div><span class="px">16px</span></div>
    <div class="sp-row"><span class="name">space-5</span><div class="bar" style="width:20px;"></div><span class="px">20px</span></div>
    <div class="sp-row"><span class="name">space-6</span><div class="bar" style="width:24px;"></div><span class="px">24px</span></div>
    <div class="sp-row"><span class="name">space-8</span><div class="bar" style="width:32px;"></div><span class="px">32px</span></div>
    <div class="sp-row"><span class="name">space-10</span><div class="bar" style="width:40px;"></div><span class="px">40px</span></div>
    <div class="sp-row"><span class="name">space-12</span><div class="bar" style="width:48px;"></div><span class="px">48px</span></div>
  </div>
</div></body></html>
