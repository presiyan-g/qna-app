<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
  .ico { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 14px; border: 1px solid var(--line); border-radius: 10px; background: var(--card); }
  .ico .glyph { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; color: var(--primary); }
  .ico .lbl { font-size: 11px; color: var(--muted); }
  .lucide { stroke: currentColor; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .uni { font-size: 24px; color: var(--primary); font-weight: 400; line-height: 1; }
</style></head>
<body><div class="card-frame">
  <div class="grid">
    <div class="ico"><div class="glyph"><span class="uni">✓</span></div><span class="lbl">U+2713</span></div>
    <div class="ico"><div class="glyph"><span class="uni">→</span></div><span class="lbl">U+2192</span></div>
    <div class="ico"><div class="glyph"><span class="uni">←</span></div><span class="lbl">U+2190</span></div>
    <div class="ico"><div class="glyph"><span class="uni">●</span></div><span class="lbl">U+25CF</span></div>

    <div class="ico"><div class="glyph"><svg class="lucide" width="22" height="22" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div><span class="lbl">comment</span></div>
    <div class="ico"><div class="glyph"><svg class="lucide" width="22" height="22" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div><span class="lbl">check-circle</span></div>
    <div class="ico"><div class="glyph"><svg class="lucide" width="22" height="22" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><span class="lbl">clock</span></div>
    <div class="ico"><div class="glyph"><svg class="lucide" width="22" height="22" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div><span class="lbl">key</span></div>
  </div>
  <p style="margin:0;font-size:12px;color:var(--muted);line-height:1.6;">
    Order of preference: <b>Unicode glyph</b> → <b>Lucide 1.6 stroke</b> → 16px hand-drawn SVG matching <code style="font-family:var(--font-mono);font-size:11px;">UserMenu.tsx</code>. Emoji is reserved for user-chosen community avatars only.
  </p>
</div></body></html>
