<!doctype html><html><head><meta charset="utf-8"><title>Leaderboard row</title>
<link rel="stylesheet" href="_base.css">
<style>
  .lb { background: var(--card); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .row { display: grid; grid-template-columns: 56px 1fr auto auto; align-items: center; gap: 16px; padding: 14px 18px; border-top: 1px solid var(--line); }
  .row:first-child { border-top: 0; }
  .rank { font-size: 22px; font-weight: 700; color: var(--primary); }
  .name { font-size: 15px; font-weight: 700; color: var(--ink); }
  .pts  { font-size: 16px; font-weight: 700; color: var(--ink); text-align: right; }
  .pts-lbl { font-size: 11px; color: var(--muted); }
  .when { font-size: 12px; color: var(--muted); }
  .crown { color: var(--accent); margin-right: 4px; }
</style></head>
<body><div class="card-frame">
  <div class="lb">
    <div class="row"><span class="rank"><span class="crown">★</span>#1</span><span class="name">@martina_l</span><div><div class="pts">1,420</div><div class="pts-lbl" style="text-align:right;">points</div></div><span class="when">Mar 14, 9:02 AM</span></div>
    <div class="row"><span class="rank">#2</span><span class="name">@kenji</span><div><div class="pts">1,310</div><div class="pts-lbl" style="text-align:right;">points</div></div><span class="when">Mar 14, 9:14 AM</span></div>
    <div class="row"><span class="rank">#3</span><span class="name">@ada_b</span><div><div class="pts">1,290</div><div class="pts-lbl" style="text-align:right;">points</div></div><span class="when">Mar 13, 8:55 PM</span></div>
  </div>
</div></body></html>
