<!doctype html><html><head><meta charset="utf-8"><title>Question row</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row {
    display: grid; grid-template-columns: 64px 1fr auto; align-items: center; gap: 16px;
    background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px;
    text-decoration: none; color: var(--ink);
    transition: border-color 200ms cubic-bezier(.16,1,.3,1), background-color 200ms cubic-bezier(.16,1,.3,1);
    cursor: pointer;
  }
  .row:hover { border-color: var(--primary); }
  .date { font-size: 12px; font-weight: 600; color: var(--muted); }
  .prompt { font-size: 15px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pill { padding: 4px 11px; border-radius: 9999px; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
  .pill .dot { width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block; }
  .live { background: var(--primary); color: var(--paper); }
  .sched { background: var(--status-warn-bg); color: var(--status-warn-fg); }
  .draft { background: var(--status-neutral-bg); color: var(--status-neutral-fg); }
  .closed { background: var(--primary-soft); color: var(--primary); }
</style></head>
<body><div class="card-frame">
  <a class="row">
    <span class="date">Mar 14</span>
    <span class="prompt">When designing an MCP server, what should you expose first?</span>
    <span class="pill live"><span class="dot"></span>Live</span>
  </a>
  <a class="row">
    <span class="date">Mar 13</span>
    <span class="prompt">Which container query unit scales with the parent's inline-size?</span>
    <span class="pill closed">Closed</span>
  </a>
  <a class="row">
    <span class="date">Mar 15</span>
    <span class="prompt">White to move. Find the forced mate in 3.</span>
    <span class="pill sched">Scheduled</span>
  </a>
  <a class="row">
    <span class="date">—</span>
    <span class="prompt">[Working draft] Effective context windows in agentic loops</span>
    <span class="pill draft">Draft</span>
  </a>
</div></body></html>
