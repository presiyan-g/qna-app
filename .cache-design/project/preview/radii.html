<!doctype html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row-r { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  .r-cell { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .r-box { width: 100%; height: 80px; background: var(--card); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; }
  .r-lbl { font-size: 11px; color: var(--muted); }
  .r-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .r-val { font-family: var(--font-mono); font-size: 10px; color: var(--muted); }
</style></head>
<body><div class="card-frame">
  <div class="row-r">
    <div class="r-cell"><div class="r-box" style="border-radius:8px;"></div><span class="r-name">sm</span><span class="r-val">8px</span><span class="r-lbl">Inputs, small btns</span></div>
    <div class="r-cell"><div class="r-box" style="border-radius:10px;"></div><span class="r-name">md</span><span class="r-val">10px</span><span class="r-lbl">Default cards</span></div>
    <div class="r-cell"><div class="r-box" style="border-radius:14px;"></div><span class="r-name">lg</span><span class="r-val">14px</span><span class="r-lbl">Featured cards</span></div>
    <div class="r-cell"><div class="r-box" style="border-radius:20px;"></div><span class="r-name">xl</span><span class="r-val">20px</span><span class="r-lbl">CTA bands</span></div>
    <div class="r-cell"><div class="r-box" style="border-radius:9999px;"></div><span class="r-name">pill</span><span class="r-val">∞</span><span class="r-lbl">Buttons, chips</span></div>
  </div>
  <p style="margin:0;font-size:12px;color:var(--muted);line-height:1.6;">
    Mixed-radius system: cards softly rounded, buttons fully pill. Avoid 4-6px rounding — it reads as default Bootstrap.
  </p>
</div></body></html>
