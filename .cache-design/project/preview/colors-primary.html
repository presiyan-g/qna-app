<!doctype html><html><head><meta charset="utf-8"><title>Primary palette</title>
<link rel="stylesheet" href="_base.css">
<style>
  .swatch { border-radius: var(--radius-md); border: 1px solid var(--line); overflow: hidden; }
  .swatch-color { height: 88px; display: flex; align-items: flex-end; padding: 12px; }
  .swatch-meta { padding: 10px 12px; background: var(--card); display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .swatch-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .swatch-hex  { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
</style></head>
<body><div class="card-frame">
  <div class="grid-4">
    <div class="swatch">
      <div class="swatch-color" style="background: var(--primary);">
        <span style="font-family:var(--font-serif);font-style:italic;color:var(--paper);font-size:18px;">primary</span>
      </div>
      <div class="swatch-meta"><span class="swatch-name">Forest</span><span class="swatch-hex">#1F4032</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background: var(--primary-hover);"></div>
      <div class="swatch-meta"><span class="swatch-name">Hover</span><span class="swatch-hex">#193428</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background: var(--primary-press);"></div>
      <div class="swatch-meta"><span class="swatch-name">Press</span><span class="swatch-hex">#13251D</span></div>
    </div>
    <div class="swatch">
      <div class="swatch-color" style="background: var(--primary-soft); border-bottom: 1px solid var(--line);">
        <span style="color: var(--primary); font-size: 13px; font-weight: 700;">PRIMARY SOFT</span>
      </div>
      <div class="swatch-meta"><span class="swatch-name">Soft tint</span><span class="swatch-hex">#F4F1E3</span></div>
    </div>
  </div>
  <p style="margin:0;font-size:12px;color:var(--muted);line-height:1.6;">
    Deep forest green is the single headline action color. Soft tint is the in-content companion used for chips, soft buttons, and avatar tiles.
  </p>
</div></body></html>
