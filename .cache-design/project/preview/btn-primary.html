<!doctype html><html><head><meta charset="utf-8"><title>Buttons — primary</title>
<link rel="stylesheet" href="_base.css">
<style>
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px solid transparent; border-radius: 9999px; cursor: pointer;
    font-family: var(--font-sans); font-weight: 600; line-height: 1;
    transition: background-color 200ms cubic-bezier(.16,1,.3,1),
                box-shadow 200ms cubic-bezier(.16,1,.3,1),
                border-color 200ms cubic-bezier(.16,1,.3,1),
                color 200ms cubic-bezier(.16,1,.3,1),
                transform 120ms cubic-bezier(.16,1,.3,1);
  }
  .btn:active { transform: translateY(1px); }
  .lg { padding: 13px 22px; font-size: 13px; }
  .md { padding: 10px 18px; font-size: 13px; }
  .sm { padding: 8px 14px; font-size: 12px; }
  .primary { background: var(--primary); color: var(--paper); }
  .primary:hover { background: #193428; box-shadow: 0 6px 16px -8px rgba(31,64,50,0.4); }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .heading { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-family: var(--font-mono); }
</style></head>
<body><div class="card-frame">
  <span class="heading">SIZES — lg · md · sm</span>
  <div class="row">
    <button class="btn primary lg">Browse communities →</button>
    <button class="btn primary md">Create</button>
    <button class="btn primary sm">Join</button>
  </div>
  <span class="heading">STATES — default · hover · disabled</span>
  <div class="row">
    <button class="btn primary md">Sign in</button>
    <button class="btn primary md" style="background:#193428;box-shadow:0 6px 16px -8px rgba(31,64,50,0.4);">Sign in (hover)</button>
    <button class="btn primary md" style="opacity:.6;cursor:not-allowed;" disabled>Signing in…</button>
  </div>
</div></body></html>
