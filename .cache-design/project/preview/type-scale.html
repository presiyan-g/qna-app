<!doctype html><html><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row-t { display: grid; grid-template-columns: 100px 1fr 90px; align-items: baseline; gap: 16px; padding: 6px 0; border-top: 1px solid var(--line); }
  .row-t:first-of-type { border-top: 0; }
  .row-t .k { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .row-t .v { color: var(--ink); }
  .row-t .m { font-family: var(--font-mono); font-size: 10px; color: var(--muted); text-align: right; }
</style></head>
<body><div class="card-frame">
  <div class="row-t"><span class="k">h1</span><span class="v" style="font-size:38px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;">Build a daily ritual</span><span class="m">38 / 700</span></div>
  <div class="row-t"><span class="k">h2</span><span class="v" style="font-size:30px;font-weight:700;letter-spacing:-0.02em;line-height:1.1;">Featured communities</span><span class="m">30 / 700</span></div>
  <div class="row-t"><span class="k">h3</span><span class="v" style="font-size:24px;font-weight:700;line-height:1.3;">Today's question</span><span class="m">24 / 700</span></div>
  <div class="row-t"><span class="k">body-lg</span><span class="v" style="font-size:17px;color:var(--muted);line-height:1.6;">Niche communities publish one question a day.</span><span class="m">17 / 400</span></div>
  <div class="row-t"><span class="k">body</span><span class="v" style="font-size:15px;line-height:1.5;">A recurring challenge community.</span><span class="m">15 / 400</span></div>
  <div class="row-t"><span class="k">small</span><span class="v" style="font-size:13px;color:var(--muted);">812 members · 12h to close</span><span class="m">13 / 400</span></div>
  <div class="row-t"><span class="k">xs</span><span class="v" style="font-size:12px;color:var(--muted);">Mar 14, 2026, 4:00 PM UTC</span><span class="m">12 / 400</span></div>
</div></body></html>
