<!doctype html><html><head><meta charset="utf-8"><title>Buttons — action family</title>
<link rel="stylesheet" href="_base.css">
<style>
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; border: 1px solid transparent; border-radius: 9999px; padding: 11px 20px; font-family: var(--font-sans); font-size: 13px; font-weight: 600; line-height: 1; cursor: pointer;
    transition: background-color 200ms cubic-bezier(.16,1,.3,1), box-shadow 200ms cubic-bezier(.16,1,.3,1), border-color 200ms cubic-bezier(.16,1,.3,1), color 200ms cubic-bezier(.16,1,.3,1), transform 120ms cubic-bezier(.16,1,.3,1); }
  .btn:active { transform: translateY(1px); }
  .primary { background: var(--primary); color: var(--paper); }
  .primary:hover { background: var(--primary-hover); box-shadow: 0 6px 16px -8px var(--primary-glow); }
  .clay { background: var(--action-clay); color: #fff; }
  .clay:hover { background: var(--action-clay-hover); box-shadow: 0 6px 16px -8px var(--action-clay-glow); }
  .lake { background: var(--action-lake); color: #fff; }
  .lake:hover { background: var(--action-lake-hover); box-shadow: 0 6px 16px -8px var(--action-lake-glow); }
  .ghost { background: transparent; color: var(--ink); border-color: var(--line); }
  .ghost:hover { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
  .accent { background: var(--accent); color: #2A2A28; }
  .accent:hover { background: #BE8C1F; box-shadow: 0 6px 16px -8px rgba(214,161,43,.4); }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--muted); width: 96px; }
  .line { display: grid; grid-template-columns: 96px 1fr; align-items: center; gap: 12px; padding: 8px 0; border-top: 1px solid var(--line); }
  .line:first-child { border-top: 0; }
  .new { display:inline-block;padding:2px 6px;border-radius:4px;background:var(--accent);color:#2a2a28;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;vertical-align:middle;margin-left:4px; }
</style></head>
<body><div class="card-frame">
  <div class="line"><span class="lbl">primary</span><div class="row"><button class="btn primary">Submit answer</button><button class="btn primary">Browse communities →</button></div></div>
  <div class="line"><span class="lbl">clay <span class="new">new</span></span><div class="row"><button class="btn clay">Leave community</button><button class="btn clay">Unsubscribe</button></div></div>
  <div class="line"><span class="lbl">lake <span class="new">new</span></span><div class="row"><button class="btn lake">Open broadcast →</button><button class="btn lake">Edit</button></div></div>
  <div class="line"><span class="lbl">ghost</span><div class="row"><button class="btn ghost">Start your own</button><button class="btn ghost">Cancel</button></div></div>
  <div class="line"><span class="lbl">accent</span><div class="row"><div style="background:var(--primary);padding:6px;border-radius:9999px;"><button class="btn accent">Browse communities →</button></div></div></div>
</div></body></html>
