<!doctype html><html><head><meta charset="utf-8"><title>Tabs</title>
<link rel="stylesheet" href="_base.css">
<style>
  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); }
  .tab {
    padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--muted);
    border-bottom: 2px solid transparent; cursor: pointer; background: none; border-top: 0; border-left: 0; border-right: 0; font-family: var(--font-sans);
    transition: color 150ms cubic-bezier(.16,1,.3,1), border-color 200ms cubic-bezier(.16,1,.3,1);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .count { background: var(--primary-soft); color: var(--primary); border-radius: 9999px; padding: 1px 8px; font-size: 11px; font-weight: 700; }
  .tab.active .count { background: var(--primary); color: var(--paper); }
  /* Window-style pill nav (leaderboard) */
  .pill-nav { display: inline-flex; padding: 4px; border: 1px solid var(--line); border-radius: 9999px; background: var(--card); }
  .pill-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; color: var(--muted); border-radius: 9999px; cursor: pointer; background: none; border: 0; font-family: var(--font-sans); transition: color 150ms; }
  .pill-btn:hover { color: var(--ink); }
  .pill-btn.active { background: var(--primary); color: var(--paper); font-weight: 700; }
</style></head>
<body><div class="card-frame">
  <div class="tabs">
    <button class="tab active">Questions <span class="count">3</span></button>
    <button class="tab">Broadcasts <span class="count">2</span></button>
    <button class="tab">Leaderboard</button>
    <button class="tab">About</button>
  </div>
  <div style="display:flex;justify-content:flex-end;">
    <div class="pill-nav">
      <button class="pill-btn active">7 days</button>
      <button class="pill-btn">30 days</button>
      <button class="pill-btn">All-time</button>
    </div>
  </div>
  <p style="margin:0;color:var(--muted);font-size:12px;line-height:1.6;">
    Two tab patterns: underline tabs for primary navigation inside a community, pill-nav for window/segment selection (leaderboard windows, filter scopes).
  </p>
</div></body></html>
