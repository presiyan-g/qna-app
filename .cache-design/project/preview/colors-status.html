<!doctype html><html><head><meta charset="utf-8"><title>Status colors</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat { border-radius: 10px; padding: 14px; }
  .stat .head { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.16em; opacity: .9; }
  .stat .body { font-size: 13px; font-weight: 600; margin-top: 6px; line-height: 1.4; }
  .pill { display: inline-flex; padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; }
</style></head>
<body><div class="card-frame">
  <div class="grid-4">
    <div class="stat" style="background: var(--primary-soft); color: var(--primary);">
      <div class="head">Success</div>
      <div class="body">Correct answer<br><span class="pill" style="background:var(--primary);color:var(--paper);margin-top:6px;">+10 pts</span></div>
    </div>
    <div class="stat" style="background: var(--status-warn-bg); color: var(--status-warn-fg);">
      <div class="head">Warn</div>
      <div class="body">Late answer<br><span class="pill" style="background:#fff;color:var(--status-warn-fg);margin-top:6px;">0 points</span></div>
    </div>
    <div class="stat" style="background: var(--status-danger-bg); color: var(--status-danger-fg); border: 1px solid var(--status-danger-border);">
      <div class="head">Danger</div>
      <div class="body">Form error<br><span class="pill" style="background:#fff;color:var(--status-danger-fg);margin-top:6px;">Required</span></div>
    </div>
    <div class="stat" style="background: var(--status-neutral-bg); color: var(--status-neutral-fg);">
      <div class="head">Neutral</div>
      <div class="body">Draft / deleted<br><span class="pill" style="background:#fff;color:var(--status-neutral-fg);margin-top:6px;">Draft</span></div>
    </div>
  </div>
  <p style="margin:0;font-size:12px;color:var(--muted);line-height:1.6;">
    Success uses the primary soft tint rather than a green check — keeps the warm earthy register. Warn and danger mirror Tailwind amber/red families used in the codebase.
  </p>
</div></body></html>
