<!doctype html><html><head><meta charset="utf-8"><title>Eyebrow & meta</title>
<link rel="stylesheet" href="_base.css">
<style>
  .stack { display: grid; gap: 18px; }
  .item { display: grid; grid-template-columns: 130px 1fr; gap: 16px; align-items: center; }
  .item .k { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
</style></head>
<body><div class="card-frame">
  <div class="stack">
    <div class="item">
      <span class="k">eyebrow · 11</span>
      <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.16em;color:var(--primary);">For creators</span>
    </div>
    <div class="item">
      <span class="k">meta · 10</span>
      <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;color:var(--muted);">1,284 members</span>
    </div>
    <div class="item">
      <span class="k">chip · 9</span>
      <span>
        <span style="display:inline-flex;padding:3px 9px;border-radius:9999px;background:var(--primary-soft);color:var(--primary);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;">Daily</span>
        <span style="display:inline-flex;padding:3px 9px;border-radius:9999px;background:transparent;color:var(--muted);border:1px solid var(--line);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.10em;margin-left:6px;">AI &amp; ML</span>
      </span>
    </div>
    <div class="item">
      <span class="k">mono</span>
      <span style="font-family:var(--font-mono);font-size:13px;color:var(--ink);">q_8f2c · scheduled_for: 2026-03-14T16:00Z</span>
    </div>
  </div>
  <p style="margin:0;color:var(--muted);font-size:12px;line-height:1.6;">
    Eyebrows orient the reader before the headline. They are the only ALL-CAPS surface in the brand, always at 11px / 0.16em tracking.
  </p>
</div></body></html>
