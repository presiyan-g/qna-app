<!doctype html><html><head><meta charset="utf-8"><title>Shadows & elevation</title>
<link rel="stylesheet" href="_base.css">
<style>
  .grid-s { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; align-items: center; padding: 16px 0; }
  .e { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px; }
  .e .name { font-family: var(--font-mono); font-size: 11px; color: var(--muted); }
  .e .v { font-size: 13px; font-weight: 600; color: var(--ink); margin-top: 4px; }
</style></head>
<body><div class="card-frame">
  <div class="grid-s">
    <div class="e">
      <div class="name">none</div>
      <div class="v">Resting</div>
    </div>
    <div class="e" style="box-shadow: 0 1px 2px 0 rgba(31,64,50,0.04);">
      <div class="name">shadow-card</div>
      <div class="v">Hover lift</div>
    </div>
    <div class="e" style="box-shadow: 0 18px 40px -22px rgba(31,64,50,0.28);">
      <div class="name">shadow-lift</div>
      <div class="v">Floating</div>
    </div>
  </div>
  <p style="margin:0;font-size:12px;color:var(--muted);line-height:1.6;">
    Almost shadowless — cards rely on the warm <code style="font-family:var(--font-mono);font-size:11px;">--line</code> hairline. Shadow color is tinted with the primary green (<code style="font-family:var(--font-mono);font-size:11px;">rgba(31,64,50,…)</code>) which keeps lifted surfaces warm rather than cold/Material.
  </p>
</div></body></html>
