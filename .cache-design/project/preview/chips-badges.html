<!doctype html><html><head><meta charset="utf-8"><title>Chips & badges</title>
<link rel="stylesheet" href="_base.css">
<style>
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 10px 0; border-top: 1px solid var(--line); }
  .row:first-of-type { border-top: 0; padding-top: 0; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--muted); width: 100px; flex-shrink: 0; }
  .chip { display: inline-flex; align-items: center; gap: 6px; border-radius: 9999px; padding: 3px 9px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.10em; }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 4px 11px; border-radius: 9999px; font-size: 11px; font-weight: 700; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; background: currentColor; }
</style></head>
<body><div class="card-frame">
  <div class="row"><span class="lbl">cadence</span>
    <span class="chip" style="background:var(--primary-soft);color:var(--primary);">Daily</span>
    <span class="chip" style="background:var(--primary-soft);color:var(--primary);">Weekly</span>
    <span class="chip" style="background:var(--primary-soft);color:var(--primary);">Custom</span>
  </div>
  <div class="row"><span class="lbl">category</span>
    <span class="chip" style="border:1px solid var(--line);color:var(--muted);">AI &amp; ML</span>
    <span class="chip" style="border:1px solid var(--line);color:var(--muted);">Chess</span>
    <span class="chip" style="border:1px solid var(--line);color:var(--muted);">Frontend</span>
  </div>
  <div class="row"><span class="lbl">state</span>
    <span class="pill" style="background:var(--primary);color:var(--paper);"><span class="dot"></span>Live</span>
    <span class="pill" style="background:var(--status-warn-bg);color:var(--status-warn-fg);">Scheduled</span>
    <span class="pill" style="background:var(--status-neutral-bg);color:var(--status-neutral-fg);">Draft</span>
    <span class="pill" style="background:var(--primary-soft);color:var(--primary);">Closed</span>
    <span class="pill" style="background:var(--status-neutral-bg);color:#888;">Deleted</span>
  </div>
  <div class="row"><span class="lbl">result</span>
    <span class="pill" style="background:var(--primary);color:var(--paper);">+10 points</span>
    <span class="pill" style="background:var(--status-warn-bg);color:var(--status-warn-fg);">Late · 0 pts</span>
    <span class="pill" style="background:var(--action-clay-soft);color:var(--action-clay-hover);">Wrong</span>
  </div>
</div></body></html>
